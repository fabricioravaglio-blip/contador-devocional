<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador Devocional</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #dbe4ff 100%);
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 { color: #1e3a8a; }
        .btn {
            padding: 20px 40px;
            font-size: 24px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #1e3a8a;
            color: white;
        }
        .btn-religiao {
            background: #f0f4ff;
            color: #1e3a8a;
            border: 3px solid #1e3a8a;
            width: 45%;
            display: inline-block;
        }
        .btn-contar {
            background: linear-gradient(135deg, #1e3a8a 0%, #d4af37 100%);
            font-size: 32px;
            padding: 40px;
            width: 90%;
        }
        .btn-menor {
            background: #dc3545;
            font-size: 18px;
            padding: 15px 30px;
        }
        .contador {
            font-size: 80px;
            color: #1e3a8a;
            margin: 30px;
            font-weight: bold;
        }
        .info {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin: 20px auto;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        input {
            padding: 15px;
            font-size: 20px;
            width: 100px;
            text-align: center;
            border: 2px solid #d4af37;
            border-radius: 10px;
        }
        .nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 10px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
        }
        .nav button {
            padding: 15px;
            font-size: 16px;
            margin: 0 5px;
        }
        .pagina { display: none; }
        .pagina.ativa { display: block; padding-bottom: 80px; }
    </style>
</head>
<body>

    <div id="pagina1" class="pagina ativa">
        <h1>🙏 Escolha sua Religião</h1>
        <button class="btn btn-religiao" onclick="escolher('catolico')">✝️<br>Católico</button>
        <button class="btn btn-religiao" onclick="escolher('islamico')">☪️<br>Islâmico</button>
        <button class="btn btn-religiao" onclick="escolher('budista')">☸️<br>Budista</button>
        <button class="btn btn-religiao" onclick="escolher('judaico')">✡️<br>Judaico</button>
    </div>

    <div id="pagina2" class="pagina">
        <h1 id="titulo">Contador</h1>
        <div class="info">
            <p>Repetições: <input type="number" id="meta" value="33" min="1"></p>
            <p id="frase">---</p>
        </div>
        <div class="contador" id="numero">0</div>
        <button class="btn btn-contar" onclick="contar()">👆 TOQUE PARA CONTAR</button>
        <br><br>
        <button class="btn btn-menor" onclick="diminuir()">➖</button>
        <button class="btn btn-menor" onclick="zerar()">↺ Zerar</button>
    </div>

    <div id="pagina3" class="pagina">
        <h1>Palavras de Referência</h1>
        <div class="info" id="lista-palavras">
            Selecione uma religião primeiro
        </div>
    </div>

    <div class="nav">
        <button class="btn" onclick="mostrar(1)" style="padding: 15px;">🙏 Religião</button>
        <button class="btn" onclick="mostrar(2)" style="padding: 15px;">🔢 Contar</button>
        <button class="btn" onclick="mostrar(3)" style="padding: 15px;">✏️ Palavras</button>
    </div>

    <script>
        var contagem = 0;
        var religiaoAtual = '';
        
        var dados = {
            catolico: { nome: 'Católico', meta: 53, frase: 'Ave Maria', palavras: 'Ave Maria, Pai Nosso, Glória, Santo, Deus, Jesus, Amém' },
            islamico: { nome: 'Islâmico', meta: 33, frase: 'SubhanAllah', palavras: 'Allah, Alhamdulillah, Allahu Akbar, SubhanAllah' },
            budista: { nome: 'Budista', meta: 108, frase: 'Om Mani Padme Hum', palavras: 'Om, Namo, Mani, Padme, Hum, Buda' },
            judaico: { nome: 'Judaico', meta: 33, frase: 'Baruch Hashem', palavras: 'Baruch, Hashem, Adonai, Shema, Shalom, Torah' }
        };

        function mostrar(num) {
            document.querySelectorAll('.pagina').forEach(function(p) {
                p.classList.remove('ativa');
            });
            document.getElementById('pagina' + num).classList.add('ativa');
        }

        function escolher(rel) {
            religiaoAtual = rel;
            var d = dados[rel];
            document.getElementById('titulo').innerHTML = d.nome + ' ' + (rel === 'catolico' ? '✝️' : rel === 'islamico' ? '☪️' : rel === 'budista' ? '☸️' : '✡️');
            document.getElementById('meta').value = d.meta;
            document.getElementById('frase').innerHTML = '<strong>' + d.frase + '</strong>';
            document.getElementById('lista-palavras').innerHTML = '<strong>Palavras sugeridas:</strong><br><br>' + d.palavras;
            contagem = 0;
            document.getElementById('numero').innerHTML = contagem;
            mostrar(2);
        }

        function contar() {
            contagem++;
            document.getElementById('numero').innerHTML = contagem;
            
            // Som simples
            try {
                var audio = new AudioContext();
                var osc = audio.createOscillator();
                var gain = audio.createGain();
                osc.connect(gain);
                gain.connect(audio.destination);
                osc.frequency.value = 800;
                gain.gain.value = 0.1;
                osc.start();
                osc.stop(audio.currentTime + 0.1);
n            } catch(e) {}\n            \n            // Vibrar\n            if (navigator.vibrate) navigator.vibrate(50);\n            \n            // Verificar se completou\n            var meta = parseInt(document.getElementById('meta').value);\n            if (contagem >= meta) {\n                setTimeout(function() {\n                    alert('Parabéns! Completou ' + contagem + ' repetições!');\n                }, 200);\n            }\n        }\n\n        function diminuir() {\n            if (contagem > 0) {\n                contagem--;\n                document.getElementById('numero').innerHTML = contagem;\n            }\n        }\n\n        function zerar() {\n            contagem = 0;\n            document.getElementById('numero').innerHTML = contagem;\n        }\n\n        // Tecla espaço no desktop\n        document.addEventListener('keydown', function(e) {\n            if (e.code === 'Space' && document.getElementById('pagina2').classList.contains('ativa')) {\n                e.preventDefault();\n                contar();\n            }\n        });\n    </script>\n</body>\n</html>
